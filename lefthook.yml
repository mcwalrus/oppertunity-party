# Lefthook — Git hook manager (https://github.com/evilmartians/lefthook)
# Install hooks once with: just hooks-install   (or: lefthook install)
# Run manually:            lefthook run pre-commit
#
# Lefthook is installed as a standalone binary (brew install lefthook).
# No package.json or node_modules required.

pre-commit:
  parallel: false   # run in sequence so ruff-lint runs before ruff-format

  commands:
    # -------------------------------------------------------------------------
    # ruff lint — fast linter (isort, pyupgrade, bugbear, pyflakes, …)
    # Auto-fixes what it can; stages the fixed files; fails on unfixable issues.
    # -------------------------------------------------------------------------
    ruff-lint:
      glob: "*.py"
      run: uv run ruff check --fix --exit-non-zero-on-fix {staged_files}
      stage_fixed: true   # re-stage files ruff auto-modified

    # -------------------------------------------------------------------------
    # ruff format — opinionated, deterministic formatter
    # -------------------------------------------------------------------------
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true   # re-stage reformatted files

    # -------------------------------------------------------------------------
    # ty — static type checker (the lint-checker; Astral's fast type-checker)
    # Checks the whole project; ty doesn't accept individual file paths.
    # Excludes .agents/ (vendored third-party skill code).
    # -------------------------------------------------------------------------
    ty:
      glob: "*.py"
      run: uv run ty check --error-on-warning --exclude '.agents/**'

    # -------------------------------------------------------------------------
    # markdown-link-check — validates every link in scraped data output.
    # Runs once per staged file (the tool only accepts one file at a time).
    # Relative links resolve against https://www.opportunity.org.nz via config.
    # -------------------------------------------------------------------------
    # -------------------------------------------------------------------------
    # astro check — TypeScript + template type-checking for the Astro site.
    # Triggers on any staged file inside site/; runs the full project check
    # because astro check doesn't accept individual file paths.
    # Requires: just site-install (pnpm install) has been run once.
    # -------------------------------------------------------------------------
    site-check:
      glob: "site/**/*.{ts,tsx,mts,astro}"
      run: cd site && pnpm check

    markdown-link-check:
      glob: "data/**/*.md"
      run: for f in {staged_files}; do npx --yes markdown-link-check --config .markdown-link-check.json "$f" || exit 1; done

    # -------------------------------------------------------------------------
    # hyperlink (https://github.com/untitaker/hyperlink) — fast static-site
    # link checker for docs/**/*.md. Renders docs/ to HTML and runs the
    # Rust binary (`npx --yes @untitaker/hyperlink`) on the result, then
    # HEAD-checks extracted external URLs with curl. Catches policy-page
    # 404s (e.g. dropped `/policies/` prefix, retired subpages) before they
    # land in the repo.
    # -------------------------------------------------------------------------
    hyperlink-docs:
      glob: "docs/**/*.md"
      run: uv run python scripts/check_docs_links.py
